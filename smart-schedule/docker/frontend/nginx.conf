worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    keepalive_timeout 65;

    # ── Gzip compression ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    server {
        listen 8080;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # ── Cache static assets (hashed filenames from Vite) ─────
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # ── SPA fallback ─────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Health check ────────────────────────────────────────
        location = /healthz {
            add_header Content-Type application/json;
            return 200 '{\"status\":\"ok\",\"service\":\"smart-schedule-frontend\"}';
        }

        # ── Security headers ─────────────────────────────────────
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options        DENY    always;
    }
}
